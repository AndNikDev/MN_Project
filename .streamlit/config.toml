# Streamlit runtime configuration.
# Reference: https://docs.streamlit.io/library/advanced-features/configuration

[server]
headless = false
runOnSave = true
fileWatcherType = "auto"

[browser]
gatherUsageStats = false

[theme]
base = "light"
primaryColor = "#2E86AB"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F4F6F8"
textColor = "#1B1B1F"
font = "sans serif"

[logger]
level = "info"
